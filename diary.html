<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Japan 2026 — Daily Diary 📔</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #C8102E;
      --navy: #1a1a2e;
      --bg: #f0f2f5;
      --card: #ffffff;
      --text: #1a1a1a;
      --muted: #666;
      --border: #e0e0e0;
      --green: #27ae60;
      --blue: #3498db;
      --hotel: #27ae60;
      --food: #e74c3c;
      --attraction: #3498db;
      --shopping: #9b59b6;
      --transport: #f39c12;
      --activity: #e67e22;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ─────────────────────────────────────────── */
    header {
      background: var(--navy);
      color: white;
      padding: 10px 16px 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .header-top h1 { font-size: 1.1rem; font-weight: 700; }
    .header-top h1 span { color: var(--red); }
    .back-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.4);
      color: white;
      padding: 5px 11px;
      border-radius: 6px;
      font-size: 0.78rem;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .back-btn:hover { background: rgba(255,255,255,0.1); }

    /* ── GLOBAL PROGRESS BARS ───────────────────────────── */
    .progress-bars {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 10px;
    }
    .progress-mini {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .progress-mini-label {
      font-size: 0.68rem;
      color: rgba(255,255,255,0.6);
      white-space: nowrap;
      width: 88px;
      flex-shrink: 0;
    }
    .progress-mini-bar-bg {
      flex: 1;
      height: 6px;
      background: rgba(255,255,255,0.15);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-mini-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.4s ease;
    }
    .stops-fill  { background: var(--green); }
    .days-fill   { background: var(--blue); }
    .progress-mini-count {
      font-size: 0.68rem;
      color: rgba(255,255,255,0.75);
      white-space: nowrap;
      min-width: 56px;
      text-align: right;
    }

    /* ── DATE NAV (mirrors index.html) ─────────────────── */
    .date-nav {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .date-nav button {
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .date-nav button:hover { background: rgba(255,255,255,0.25); }
    .date-nav button:disabled { opacity: 0.3; cursor: default; }
    #date-input {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 0.85rem;
      flex: 1;
      cursor: pointer;
    }
    #date-input::-webkit-calendar-picker-indicator { filter: invert(1); }
    .day-counter {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.6);
      white-space: nowrap;
    }

    /* ── MAIN ───────────────────────────────────────────── */
    main {
      max-width: 640px;
      margin: 0 auto;
      padding: 14px 12px 80px;
    }

    /* ── DIARY DAY CARD ─────────────────────────────────── */
    .diary-day {
      background: var(--card);
      border-radius: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.09);
      overflow: hidden;
    }
    .diary-day-header {
      background: linear-gradient(135deg, var(--navy), #2d2d54);
      color: white;
      padding: 14px 18px;
    }
    .diary-date {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }
    .diary-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 3px; }
    .diary-location { font-size: 0.82rem; color: rgba(255,255,255,0.65); }
    .diary-body { padding: 16px 18px; }

    /* ── SECTION LABEL ──────────────────────────────────── */
    .diary-section { margin-bottom: 20px; }
    .diary-section:last-child { margin-bottom: 0; }
    .section-label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* ── VISITED STOPS ──────────────────────────────────── */
    .visited-stop-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .visited-stop-item:last-child { border-bottom: none; }
    .stop-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 5px;
    }
    .type-hotel     { background: var(--hotel); }
    .type-food      { background: var(--food); }
    .type-attraction{ background: var(--attraction); }
    .type-shopping  { background: var(--shopping); }
    .type-transport { background: var(--transport); }
    .type-activity  { background: var(--activity); }
    .stop-name { font-size: 0.9rem; font-weight: 600; }
    .stop-time { font-size: 0.75rem; color: var(--muted); margin-top: 1px; }

    /* ── EMPTY STATE ────────────────────────────────────── */
    .empty-day {
      text-align: center;
      padding: 32px 16px;
      color: var(--muted);
    }
    .empty-icon { font-size: 2.2rem; margin-bottom: 10px; }
    .empty-msg { font-size: 0.9rem; margin-bottom: 14px; }
    .empty-link {
      display: inline-block;
      background: var(--navy);
      color: white;
      padding: 9px 18px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
    }

    /* ── INSTAGRAM EMBEDS ───────────────────────────────── */
    .ig-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .ig-embed-wrap {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #fafafa;
      width: 320px;
      max-width: 100%;
      flex-shrink: 0;
    }
    .ig-embed {
      display: block;
      width: 320px;
      max-width: 100%;
      height: 480px;
      border: none;
    }

    /* ── LOADING ────────────────────────────────────────── */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>📔 <span>Daily</span> Diary</h1>
    <a class="back-btn" href="index.html">← Itinerary</a>
  </div>

  <!-- GLOBAL PROGRESS (always visible) -->
  <div class="progress-bars" id="progress-bars">
    <!-- rendered by renderProgress() -->
  </div>

  <!-- DAY NAVIGATION -->
  <div class="date-nav">
    <button id="btn-prev" onclick="changeDay(-1)">‹</button>
    <input type="date" id="date-input" onchange="selectDate(this.value)" />
    <button id="btn-next" onclick="changeDay(1)">›</button>
    <span class="day-counter" id="day-counter"></span>
  </div>
</header>

<main id="main-content">
  <div class="loading">Loading diary…</div>
</main>

<script>
// ─── CONFIG ───────────────────────────────────────────────
const REPO    = 'akdrewfus/JapanTravel';
const BRANCH  = 'main';
const FILE    = 'itinerary.json';
const RAW_URL = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/${FILE}`;

// Trip timeline bounds (for the days-elapsed bar)
const TRIP_START = new Date('2026-05-26T00:00:00');
const TRIP_END   = new Date('2026-06-10T00:00:00');

const TYPE_EMOJI = {
  hotel: '🏨', food: '🍜', attraction: '🏛️',
  shopping: '🛍️', transport: '🚉', activity: '🎟️',
};

let itinerary    = null;
let selectedDate = null;

// ─── INIT ─────────────────────────────────────────────────
async function init() {
  const cached = localStorage.getItem('japan_itinerary_cache');
  if (cached) {
    try { itinerary = JSON.parse(cached); boot(); } catch {}
  }
  try {
    const resp = await fetch(RAW_URL + `?t=${Date.now()}`);
    if (resp.ok) {
      itinerary = await resp.json();
      localStorage.setItem('japan_itinerary_cache', JSON.stringify(itinerary));
      boot();
    }
  } catch (e) {
    if (!itinerary) {
      document.getElementById('main-content').innerHTML =
        `<div class="loading">⚠️ Could not load diary. Check connection and reload.</div>`;
    }
  }
}

function boot() {
  if (!selectedDate) selectedDate = getActiveDate();
  updateNav();
  renderProgress();
  renderDayContent();
}

// ─── DATE HELPERS ─────────────────────────────────────────
function getActiveDate() {
  const today = new Date().toLocaleDateString('sv'); // YYYY-MM-DD local
  const dates = itinerary.days.map(d => d.date);
  if (dates.includes(today)) return today;
  const future = dates.filter(d => d >= today);
  return future.length ? future[0] : dates[dates.length - 1];
}

function getDayIndex(date) {
  return itinerary.days.findIndex(d => d.date === date);
}

function changeDay(delta) {
  const idx    = getDayIndex(selectedDate);
  const newIdx = idx + delta;
  if (newIdx >= 0 && newIdx < itinerary.days.length) {
    selectedDate = itinerary.days[newIdx].date;
    updateNav();
    renderDayContent();
    // progress bars don't change per-day, no need to re-render them on nav
  }
}

function selectDate(val) {
  if (!val) return;
  const dates  = itinerary.days.map(d => d.date);
  const exact  = dates.find(d => d === val);
  if (exact) {
    selectedDate = exact;
  } else {
    const future = dates.filter(d => d >= val);
    selectedDate = future.length ? future[0] : dates[dates.length - 1];
  }
  updateNav();
  renderDayContent();
}

function updateNav() {
  const idx   = getDayIndex(selectedDate);
  const total = itinerary.days.length;
  document.getElementById('date-input').value   = selectedDate;
  document.getElementById('btn-prev').disabled  = idx <= 0;
  document.getElementById('btn-next').disabled  = idx >= total - 1;
  document.getElementById('day-counter').textContent = `Day ${idx + 1} of ${total}`;
}

// ─── GLOBAL PROGRESS BARS ─────────────────────────────────
function renderProgress() {
  // 1) Stops visited
  let totalStops = 0, visitedCount = 0;
  itinerary.days.forEach(d =>
    (d.stops || []).forEach(s => { totalStops++; if (s.visited) visitedCount++; })
  );
  const stopsPct = totalStops > 0 ? Math.round(visitedCount / totalStops * 100) : 0;

  // 2) Trip timeline (May 26 → June 10)
  const now      = new Date();
  const totalMs  = TRIP_END - TRIP_START;
  const elapsed  = Math.max(0, Math.min(now - TRIP_START, totalMs));
  const daysPct  = Math.round(elapsed / totalMs * 100);
  const daysGone = Math.floor(elapsed / 86400000); // ms per day
  const totalDays = Math.round(totalMs  / 86400000);

  document.getElementById('progress-bars').innerHTML = `
    <div class="progress-mini">
      <span class="progress-mini-label">Stops visited</span>
      <div class="progress-mini-bar-bg">
        <div class="progress-mini-bar-fill stops-fill" style="width:${stopsPct}%"></div>
      </div>
      <span class="progress-mini-count">${visitedCount} / ${totalStops}</span>
    </div>
    <div class="progress-mini">
      <span class="progress-mini-label">Trip timeline</span>
      <div class="progress-mini-bar-bg">
        <div class="progress-mini-bar-fill days-fill" style="width:${daysPct}%"></div>
      </div>
      <span class="progress-mini-count">Day ${daysGone} / ${totalDays}</span>
    </div>`;
}

// ─── SINGLE DAY VIEW ──────────────────────────────────────
function renderDayContent() {
  const day  = itinerary.days.find(d => d.date === selectedDate);
  const main = document.getElementById('main-content');
  if (!day) return;

  const dateObj  = new Date(day.date + 'T12:00:00');
  const dateStr  = dateObj.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  const visited  = (day.stops || []).filter(s => s.visited);
  const posts    = day.instagramPosts || [];

  // Hero
  const heroHtml = `
    <div class="diary-day-header">
      <div class="diary-date">${dateStr}</div>
      <div class="diary-title">${esc(day.title)}</div>
      <div class="diary-location">📍 ${esc(day.location)}</div>
    </div>`;

  // Visited stops
  const stopsHtml = visited.length ? `
    <div class="diary-section">
      <div class="section-label">Places We Went</div>
      ${visited.map(s => `
        <div class="visited-stop-item">
          <span class="stop-dot type-${esc(s.type)}"></span>
          <div>
            <div class="stop-name">${TYPE_EMOJI[s.type] || '📌'} ${esc(s.name)}</div>
            ${s.time ? `<div class="stop-time">⏰ ${esc(s.time)}</div>` : ''}
          </div>
        </div>`).join('')}
    </div>` : '';

  // Instagram embeds (display only)
  const igHtml = posts.length ? `
    <div class="diary-section">
      <div class="section-label">📸 Instagram Highlights</div>
      <div class="ig-grid">
        ${posts.map(code => `
          <div class="ig-embed-wrap">
            <iframe src="https://www.instagram.com/p/${esc(code)}/embed"
                    class="ig-embed" frameborder="0" scrolling="no"
                    allowtransparency="true" loading="lazy"></iframe>
          </div>`).join('')}
      </div>
    </div>` : '';

  // Empty state (no visited stops AND no posts)
  const emptyHtml = (!visited.length && !posts.length) ? `
    <div class="empty-day">
      <div class="empty-icon">📖</div>
      <div class="empty-msg">Nothing logged for this day yet</div>
      <a href="index.html" class="empty-link">Mark stops as visited →</a>
    </div>` : '';

  main.innerHTML = `
    <div class="diary-day">
      ${heroHtml}
      <div class="diary-body">
        ${emptyHtml}
        ${stopsHtml}
        ${igHtml}
      </div>
    </div>`;
}


// ─── UTILS ────────────────────────────────────────────────
function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── GO ───────────────────────────────────────────────────
init();
</script>
</body>
</html>
