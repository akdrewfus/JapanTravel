<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Japan 2026 — Daily Diary 📔</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #C8102E;
      --navy: #1a1a2e;
      --bg: #f0f2f5;
      --card: #ffffff;
      --text: #1a1a1a;
      --muted: #666;
      --border: #e0e0e0;
      --green: #27ae60;
      --hotel: #27ae60;
      --food: #e74c3c;
      --attraction: #3498db;
      --shopping: #9b59b6;
      --transport: #f39c12;
      --activity: #e67e22;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: var(--navy);
      color: white;
      padding: 12px 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-top h1 { font-size: 1.2rem; font-weight: 700; }
    .header-top h1 span { color: var(--red); }
    .back-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.4);
      color: white;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.1); }
    .header-sub {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.55);
      margin-top: 3px;
    }

    /* MAIN */
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 16px 12px 80px;
    }

    /* EMPTY / LOADING */
    .no-data {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .no-data h2 { font-size: 1.2rem; margin-bottom: 10px; }
    .no-data p { font-size: 0.9rem; margin-bottom: 16px; }
    .no-data a {
      display: inline-block;
      background: var(--navy);
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
    }
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* DIARY DAY CARD */
    .diary-day {
      background: var(--card);
      border-radius: 14px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.09);
      overflow: hidden;
    }
    .diary-day-header {
      background: linear-gradient(135deg, var(--navy), #2d2d54);
      color: white;
      padding: 14px 18px;
    }
    .diary-date {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }
    .diary-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 3px;
    }
    .diary-location {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.65);
    }
    .diary-body { padding: 16px 18px; }

    /* SECTION LABEL */
    .section-label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* VISITED STOPS LIST */
    .visited-stops { margin-bottom: 18px; }
    .visited-stop-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .visited-stop-item:last-child { border-bottom: none; }
    .stop-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 5px;
    }
    .type-hotel    { background: var(--hotel); }
    .type-food     { background: var(--food); }
    .type-attraction { background: var(--attraction); }
    .type-shopping { background: var(--shopping); }
    .type-transport { background: var(--transport); }
    .type-activity { background: var(--activity); }
    .stop-name { font-size: 0.9rem; font-weight: 600; }
    .stop-time { font-size: 0.75rem; color: var(--muted); margin-top: 1px; }

    /* INSTAGRAM SECTION */
    .instagram-section { margin-bottom: 18px; }
    .ig-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .ig-embed-wrap {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #fafafa;
      width: 320px;
      max-width: 100%;
      flex-shrink: 0;
    }
    .ig-embed {
      display: block;
      width: 320px;
      max-width: 100%;
      height: 480px;
      border: none;
    }
    .ig-remove {
      position: absolute;
      top: 6px;
      right: 6px;
      background: rgba(0,0,0,0.65);
      color: white;
      border: none;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      cursor: pointer;
      font-size: 0.65rem;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: background 0.15s;
      z-index: 10;
    }
    .ig-remove:hover { background: rgba(200,16,46,0.85); }

    /* ADD POST */
    .add-post-section { margin-top: 4px; }
    .add-post-row {
      display: flex;
      gap: 8px;
      margin-bottom: 6px;
    }
    .ig-input {
      flex: 1;
      padding: 9px 11px;
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 0.84rem;
      font-family: inherit;
      color: var(--text);
      background: #f8f9fa;
      transition: border-color 0.2s;
    }
    .ig-input:focus { outline: none; border-color: var(--navy); background: white; }
    .ig-add-btn {
      background: var(--navy);
      color: white;
      border: none;
      padding: 9px 16px;
      border-radius: 7px;
      font-size: 0.84rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s;
    }
    .ig-add-btn:hover { opacity: 0.85; }
    .ig-hint {
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.4;
    }

    /* PAT MODAL */
    .pat-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 3000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .pat-modal.open { display: flex; }
    .pat-box {
      background: white;
      border-radius: 12px;
      padding: 24px;
      max-width: 400px;
      width: 100%;
    }
    .pat-box h3 { margin-bottom: 8px; }
    .pat-box p { font-size: 0.82rem; color: var(--muted); margin-bottom: 12px; line-height: 1.5; }
    .pat-box input {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.85rem;
      margin-bottom: 10px;
      font-family: monospace;
    }
    .pat-actions { display: flex; gap: 8px; }
    .pat-actions button { flex: 1; padding: 10px; border-radius: 6px; font-size: 0.85rem; cursor: pointer; border: none; }
    .pat-save { background: var(--navy); color: white; }
    .pat-cancel { background: var(--bg); color: var(--text); border: 1px solid var(--border) !important; }

    /* SAVE STATUS TOAST */
    .save-status {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a;
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 0.85rem;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }
    .save-status.show { opacity: 1; }

    /* DIVIDER */
    .diary-divider {
      height: 1px;
      background: var(--border);
      margin: 4px 0 16px;
    }

    /* PROGRESS BAR */
    .progress-banner {
      background: var(--card);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .progress-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .progress-label { font-size: 0.8rem; font-weight: 600; color: var(--text); }
    .progress-count { font-size: 0.8rem; color: var(--muted); }
    .progress-bar-bg {
      height: 8px;
      background: #e8f0e8;
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--green);
      border-radius: 4px;
      transition: width 0.4s ease;
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>📔 <span>Daily</span> Diary</h1>
    <a class="back-btn" href="index.html">← Itinerary</a>
  </div>
  <div class="header-sub">Japan 2026 · Andrew &amp; Sadie</div>
</header>

<main id="main-content">
  <div class="loading">Loading diary…</div>
</main>

<!-- PAT MODAL -->
<div class="pat-modal" id="pat-modal">
  <div class="pat-box">
    <h3>🔑 GitHub Access Token</h3>
    <p>Enter your GitHub Personal Access Token to save Instagram posts. Same token as the main itinerary app — stored only in this browser.</p>
    <input type="password" id="pat-input" placeholder="github_pat_…" />
    <div class="pat-actions">
      <button class="pat-cancel" onclick="closePat()">Cancel</button>
      <button class="pat-save" onclick="savePat()">Save Token</button>
    </div>
  </div>
</div>

<!-- SAVE STATUS TOAST -->
<div class="save-status" id="save-status"></div>

<script>
// ─── CONFIG ───────────────────────────────────────────────
const REPO    = 'akdrewfus/JapanTravel';
const BRANCH  = 'main';
const FILE    = 'itinerary.json';
const RAW_URL = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/${FILE}`;
const API_URL = `https://api.github.com/repos/${REPO}/contents/${FILE}`;

const TYPE_EMOJI = {
  hotel: '🏨', food: '🍜', attraction: '🏛️',
  shopping: '🛍️', transport: '🚉', activity: '🎟️',
};

let itinerary = null;

// ─── INIT ─────────────────────────────────────────────────
async function init() {
  // Show cached data immediately if available
  const cached = localStorage.getItem('japan_itinerary_cache');
  if (cached) {
    try { itinerary = JSON.parse(cached); render(); } catch {}
  }
  // Always fetch fresh copy
  try {
    const resp = await fetch(RAW_URL + `?t=${Date.now()}`);
    if (resp.ok) {
      itinerary = await resp.json();
      localStorage.setItem('japan_itinerary_cache', JSON.stringify(itinerary));
      render();
    }
  } catch (e) {
    if (!itinerary) {
      document.getElementById('main-content').innerHTML =
        `<div class="no-data"><h2>⚠️ Could not load diary</h2><p>Check your connection and reload.</p><a href="index.html">← Back to Itinerary</a></div>`;
    }
  }
}

// ─── RENDER ───────────────────────────────────────────────
function render() {
  const main = document.getElementById('main-content');
  if (!itinerary) return;

  // Compute overall progress
  let totalStops = 0, visitedStops = 0;
  itinerary.days.forEach(d => {
    (d.stops || []).forEach(s => {
      totalStops++;
      if (s.visited) visitedStops++;
    });
  });

  // Find days that have visited stops or Instagram posts
  const activeDays = itinerary.days.filter(d =>
    (d.stops || []).some(s => s.visited) || (d.instagramPosts || []).length > 0
  );

  if (!activeDays.length) {
    main.innerHTML = `
      <div class="progress-banner">
        <div class="progress-row">
          <span class="progress-label">Trip Progress</span>
          <span class="progress-count">0 of ${totalStops} stops visited</span>
        </div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:0%"></div></div>
      </div>
      <div class="no-data">
        <h2>📖 No diary entries yet</h2>
        <p>Head to the itinerary and tap <strong>○ Mark Visited</strong> on each stop as you explore. They'll appear here automatically.</p>
        <a href="index.html">← Go to Itinerary</a>
      </div>`;
    return;
  }

  const pct = totalStops > 0 ? Math.round((visitedStops / totalStops) * 100) : 0;
  const progressHtml = `
    <div class="progress-banner">
      <div class="progress-row">
        <span class="progress-label">Trip Progress</span>
        <span class="progress-count">${visitedStops} of ${totalStops} stops visited</span>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    </div>`;

  main.innerHTML = progressHtml + activeDays.map(day => renderDay(day)).join('');
}

function renderDay(day) {
  const dateObj = new Date(day.date + 'T12:00:00');
  const dateStr = dateObj.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  const visited = (day.stops || []).filter(s => s.visited);
  const posts   = day.instagramPosts || [];

  const stopsHtml = visited.length ? `
    <div class="visited-stops">
      <div class="section-label">Places We Went</div>
      ${visited.map(s => `
        <div class="visited-stop-item">
          <span class="stop-dot type-${esc(s.type)}"></span>
          <div>
            <div class="stop-name">${TYPE_EMOJI[s.type] || '📌'} ${esc(s.name)}</div>
            ${s.time ? `<div class="stop-time">⏰ ${esc(s.time)}</div>` : ''}
          </div>
        </div>`).join('')}
    </div>` : '';

  const igHtml = posts.length ? `
    <div class="instagram-section">
      <div class="section-label">📸 Instagram Highlights</div>
      <div class="ig-grid">
        ${posts.map(code => `
          <div class="ig-embed-wrap">
            <iframe src="https://www.instagram.com/p/${esc(code)}/embed"
                    class="ig-embed"
                    frameborder="0" scrolling="no" allowtransparency="true"
                    loading="lazy"></iframe>
            <button class="ig-remove" onclick="removePost('${esc(day.date)}','${esc(code)}')" title="Remove post">✕</button>
          </div>`).join('')}
      </div>
    </div>` : '';

  const hasDivider = (stopsHtml || igHtml) ? `<div class="diary-divider"></div>` : '';

  return `
    <div class="diary-day">
      <div class="diary-day-header">
        <div class="diary-date">${dateStr}</div>
        <div class="diary-title">${esc(day.title)}</div>
        <div class="diary-location">📍 ${esc(day.location)}</div>
      </div>
      <div class="diary-body">
        ${stopsHtml}
        ${igHtml}
        ${hasDivider}
        <div class="add-post-section">
          <div class="section-label">Add Instagram Post</div>
          <div class="add-post-row">
            <input type="text" class="ig-input" id="ig-${esc(day.date)}"
                   placeholder="Paste post URL or shortcode…"
                   onkeydown="if(event.key==='Enter')addPost('${esc(day.date)}')" />
            <button class="ig-add-btn" onclick="addPost('${esc(day.date)}')">Add</button>
          </div>
          <div class="ig-hint">Paste the full Instagram URL or just the post shortcode (e.g. CxY8abc123D)</div>
        </div>
      </div>
    </div>`;
}

// ─── ADD / REMOVE INSTAGRAM POST ──────────────────────────
async function addPost(date) {
  const input = document.getElementById(`ig-${date}`);
  if (!input) return;
  let val = input.value.trim();
  if (!val) return;

  // Extract shortcode from full URL if pasted
  const urlMatch = val.match(/instagram\.com\/p\/([^\/\?&#]+)/);
  if (urlMatch) val = urlMatch[1];

  const pat = localStorage.getItem('japan_pat');
  if (!pat) { openPat(() => addPost(date)); return; }

  const day = itinerary.days.find(d => d.date === date);
  if (!day) return;
  day.instagramPosts = day.instagramPosts || [];
  if (day.instagramPosts.includes(val)) { showToast('Already added!'); return; }

  day.instagramPosts.push(val);
  input.value = '';
  showToast('⏳ Saving…');

  try {
    await writeToGitHub(`Add Instagram post to ${date}`);
    showToast('✅ Post added to diary!');
    render();
  } catch (e) {
    day.instagramPosts = day.instagramPosts.filter(c => c !== val);
    showToast(`❌ ${e.message}`);
  }
}

async function removePost(date, code) {
  if (!confirm('Remove this post from the diary?')) return;
  const pat = localStorage.getItem('japan_pat');
  if (!pat) { openPat(() => removePost(date, code)); return; }

  const day = itinerary.days.find(d => d.date === date);
  if (!day) return;
  const prev = day.instagramPosts;
  day.instagramPosts = (day.instagramPosts || []).filter(c => c !== code);

  showToast('⏳ Saving…');
  try {
    await writeToGitHub(`Remove Instagram post from ${date}`);
    showToast('✅ Removed.');
    render();
  } catch (e) {
    day.instagramPosts = prev;
    showToast(`❌ ${e.message}`);
  }
}

// ─── GITHUB WRITE-BACK ────────────────────────────────────
async function writeToGitHub(commitMsg) {
  const pat = localStorage.getItem('japan_pat');
  const getResp = await fetch(API_URL, {
    headers: { Authorization: `Bearer ${pat}`, Accept: 'application/vnd.github+json' }
  });
  if (!getResp.ok) {
    let detail = `HTTP ${getResp.status}`;
    try { const e = await getResp.json(); detail += ': ' + (e.message || JSON.stringify(e)); } catch {}
    if (getResp.status === 401) detail += ' — token invalid or expired';
    if (getResp.status === 403) detail += ' — token lacks repo/contents write scope';
    if (getResp.status === 404) detail += ' — repo or file not found';
    throw new Error('Could not get file SHA — ' + detail);
  }
  const fileInfo = await getResp.json();
  const jsonStr  = JSON.stringify(itinerary, null, 2);
  const encoded  = btoa(unescape(encodeURIComponent(jsonStr)));
  const putResp = await fetch(API_URL, {
    method: 'PUT',
    headers: {
      Authorization: `Bearer ${pat}`,
      Accept: 'application/vnd.github+json',
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({ message: commitMsg, content: encoded, sha: fileInfo.sha, branch: BRANCH }),
  });
  if (!putResp.ok) {
    const err = await putResp.json();
    throw new Error(err.message || 'Save failed');
  }
  localStorage.setItem('japan_itinerary_cache', JSON.stringify(itinerary));
}

// ─── PAT MODAL ────────────────────────────────────────────
let _afterPat = null;
function openPat(callback) { _afterPat = callback || null; document.getElementById('pat-modal').classList.add('open'); }
function closePat() { document.getElementById('pat-modal').classList.remove('open'); }
function savePat() {
  const val = document.getElementById('pat-input').value.trim();
  if (!val) { alert('Please enter a token.'); return; }
  localStorage.setItem('japan_pat', val);
  closePat();
  if (_afterPat) _afterPat();
}

// ─── TOAST ────────────────────────────────────────────────
let _toastTimer;
function showToast(msg) {
  const el = document.getElementById('save-status');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 4000);
}

// ─── UTILS ────────────────────────────────────────────────
function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── GO ───────────────────────────────────────────────────
init();
</script>
</body>
</html>
